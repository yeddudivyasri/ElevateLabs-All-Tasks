<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - JobPortal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container" style="max-width:450px;">
    <div class="card">
        <h3>Login</h3>

        <div class="alert-success" th:if="${param.registered}">
            Registration successful! Please log in.
        </div>
        <div class="alert-error" th:if="${param.error}">
            Invalid email or password.
        </div>
        <div class="alert-success" th:if="${param.logout}">
            You have been logged out.
        </div>

        <form th:action="@{/login}" method="post">
            <div>
                <label>Email</label>
                <input type="email" name="username" placeholder="john@example.com" required />
            </div>
            <div>
                <label>Password</label>
                <input type="password" name="password" placeholder="Password" required />
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>
        <p style="margin-top:1rem;">Don't have an account? <a th:href="@{/register}">Register</a></p>

        <div class="card" style="margin-top:1.2rem; background:#f4f6f9;">
            <strong>Demo Credentials</strong>
            <p style="margin-top:0.4rem;">Employer: employer@demo.com / password123</p>
            <p>Applicant: applicant@demo.com / password123</p>
        </div>
    </div>
</div>
</body>
</html>
